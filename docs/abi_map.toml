# ABI Map — mire_* → rt_*/pal_* migration registry
#
# Maps every @mire_* LLVM symbol (declared in llvm_functions.rs) to its
# new @rt_* (runtime core) or @pal_* (platform abstraction layer) equivalent.
# kioto_abi.c has been deleted; codegen emits rt_*/pal_* directly.
#
# Categories:
#   runtime  → src/runtime/ (platform‑independent)
#   pal      → src/pal/     (OS‑dependent, per‑platform backends)
#   removed  → dead declaration, no call sites
#   special  → entry point, not an extern

[entry.mire_main]
target = "@mire_main"
reason = "User program entry point — not an extern, stays as-is"

[entry.mire_runtime_panic]
target = "@rt_panic"
kind = "runtime"
header = "runtime.h"

